---
- name: Deploiement Registry Securise HTTPS
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-secure"
    public_ip: "{{ ansible_host }}"

  tasks:
    - name: Installation des paquets
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils
          - python3-passlib
          - openssl
        state: present

    - name: Ajout user au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Creation des dossiers
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/certs"
        - "{{ project_dir }}/nginx"

    - name: Generation mot de passe admin
      command: htpasswd -Bbc {{ project_dir }}/auth/registry.password admin admin123
      args:
        creates: "{{ project_dir }}/auth/registry.password"

    - name: Generation certificat SSL auto-signe
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout {{ project_dir }}/certs/registry.key
        -out {{ project_dir }}/certs/registry.crt
        -subj "/CN={{ public_ip }}"
      args:
        creates: "{{ project_dir }}/certs/registry.crt"

    - name: Copie du nginx.conf
      template:
        src: nginx.conf.j2
        dest: "{{ project_dir }}/nginx/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copie du docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Stop stack
      command: docker compose down
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: yes

    - name: Demarrage de la stack
      command: docker compose up --force-recreate -d
      args:
        chdir: "{{ project_dir }}"

    - name: Recuperation du statut des conteneurs
      command: docker compose ps
      args:
        chdir: "{{ project_dir }}"
      register: compose_ps_output

    - name: Affichage du statut final dans la console
      debug:
        msg: "{{ compose_ps_output.stdout_lines }}"

    - name: Affichage des tests a faire
      debug:
        msg:
          - "docker login {{ public_ip }}:443"
          - "docker tag alpine {{ public_ip }}:443/alpine:v1"
          - "docker push {{ public_ip }}:443/alpine:v1"
          - "https://{{ public_ip }}"
