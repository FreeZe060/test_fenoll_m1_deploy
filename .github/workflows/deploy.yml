name: Deploy Full Stack

on:
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_IP }}:443

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── SSH SETUP ────────────────────────────────────────────────────────
      - name: Configuration cle SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/app-key.pem
          chmod 600 /tmp/app-key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ─── DOCKER : Build et Push images ───────────────────────────────────
      - name: Configuration registre insecure
        run: |
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_IP }}:443"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login au registre prive
        run: docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build et Push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://${{ secrets.EC2_HOST }}:8000 \
            -f Dockerfile.react \
            -t ${{ env.REGISTRY }}/frontend:latest .
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Build et Push backend
        run: |
          docker build -f Dockerfile -t ${{ env.REGISTRY }}/backend:latest .
          docker push ${{ env.REGISTRY }}/backend:latest

      # ─── ANSIBLE : Installation Docker sur EC2 ───────────────────────────
      - name: Installation Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible openssh-client

      - name: Execution playbook Ansible
        run: |
          ansible-playbook -i '${{ secrets.EC2_HOST }},' \
            --private-key /tmp/app-key.pem \
            --user ubuntu \
            --ssh-common-args='-o StrictHostKeyChecking=no' \
            -e "registry_ip=${{ secrets.REGISTRY_IP }}" \
            infra/deploy-app.yml

      # ─── DEPLOIEMENT : SSH vers EC2 ──────────────────────────────────────
      - name: Generation docker-compose.yml
        run: |
          sed -e "s|{{ registry_ip }}|${{ secrets.REGISTRY_IP }}|g" \
              -e "s|{{ db_password }}|${{ secrets.DB_PASSWORD }}|g" \
              infra/app-compose.yml.j2 > /tmp/docker-compose.yml

      - name: Copie fichiers sur EC2
        run: |
          scp -i /tmp/app-key.pem /tmp/docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/docker-compose.yml
          ssh -i /tmp/app-key.pem ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/sqlfiles"
          scp -i /tmp/app-key.pem sqlfiles/*.sql ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/sqlfiles/

      - name: Demarrage stack via SSH
        run: |
          ssh -i /tmp/app-key.pem ubuntu@${{ secrets.EC2_HOST }} \
            "docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} -p '${{ secrets.REGISTRY_PASSWORD }}' && \
             cd /home/ubuntu && \
             sudo docker compose pull && \
             sudo docker compose down && \
             sudo docker compose up -d"

      # ─── VALIDATION : Tests post-deploiement ─────────────────────────────
      - name: Attente demarrage stack
        run: sleep 30

      - name: Diagnostic containers
        if: always()
        run: |
          ssh -i /tmp/app-key.pem ubuntu@${{ secrets.EC2_HOST }} \
            "cd /home/ubuntu && sudo docker compose ps && echo '--- LOGS ---' && sudo docker compose logs --tail=20" || true

      - name: Test Frontend
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:80 \
            --connect-timeout 10 --max-time 20 \
            --retry 5 --retry-delay 10 --retry-connrefused --retry-max-time 120

      - name: Test Backend
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:8000 \
            --connect-timeout 10 --max-time 20 \
            --retry 5 --retry-delay 10 --retry-connrefused --retry-max-time 120
