name: Deploy Full Stack

on:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-west-3
  REGISTRY: ${{ secrets.REGISTRY_IP }}:443

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── TERRAFORM : Provision EC2 applicative ───────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.3.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply -auto-approve

      - name: Recuperation IP et cle SSH
        id: tf
        working-directory: ./infra
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT
          terraform output -raw private_key > /tmp/app-key.pem
          chmod 400 /tmp/app-key.pem

      # ─── DOCKER : Build et Push images ───────────────────────────────
      - name: Configuration registre insecure
        run: |
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_IP }}:443"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login au registre prive
        run: docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build et Push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://${{ steps.tf.outputs.instance_ip }}:8000 \
            -f Dockerfile.react \
            -t ${{ env.REGISTRY }}/frontend:latest .
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Build et Push backend
        run: |
          docker build -f Dockerfile -t ${{ env.REGISTRY }}/backend:latest .
          docker push ${{ env.REGISTRY }}/backend:latest

      # ─── ANSIBLE : Deploiement sur EC2 ───────────────────────────────
      - name: Generation inventory.ini
        run: |
          cat > infra/inventory.ini << EOF
          [app_hosts]
          ${{ steps.tf.outputs.instance_ip }}

          [app_hosts:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=/tmp/app-key.pem
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Installation Ansible
        run: sudo apt update && sudo apt install -y ansible

      - name: Attente demarrage EC2
        run: sleep 30

      - name: Execution playbook Ansible
        run: |
          ansible-playbook -i infra/inventory.ini infra/deploy-app.yml \
            -e "registry_ip=${{ secrets.REGISTRY_IP }}" \
            -e "registry_user=${{ secrets.REGISTRY_USER }}" \
            -e "registry_password=${{ secrets.REGISTRY_PASSWORD }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}"

      # ─── VALIDATION : Tests post-deploiement ─────────────────────────
      - name: Attente demarrage stack
        run: sleep 40

      - name: Test Frontend
        run: |
          curl -f http://${{ steps.tf.outputs.instance_ip }}:80 \
            --retry 5 --retry-delay 10 --retry-connrefused

      - name: Test Backend
        run: |
          curl -f http://${{ steps.tf.outputs.instance_ip }}:8000 \
            --retry 5 --retry-delay 10 --retry-connrefused
